<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geolytics — Acerca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=General+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet">

<script>
  const TWEAKS = /*EDITMODE-BEGIN*/{
    "theme": "forest",
    "density": "comfortable",
    "language": "es",
    "showGrid": true
  }/*EDITMODE-END*/;

  // Anti-parpadeo: aplica el tema y el color de fondo ANTES de cargar el CSS
  // externo, para que el primer pixel ya sea del color correcto (no blanco).
  (function(){
    var BG = { forest:'#F4F1EA', midnight:'#0E1116' };
    var __stored = null; try { __stored = localStorage.getItem('geolytics-theme'); } catch(e){}
    var t = __stored || (typeof TWEAKS !== 'undefined' && TWEAKS.theme) || 'forest';
    document.documentElement.setAttribute('data-theme', t);
    document.documentElement.style.background = BG[t] || '#F4F1EA';
  })();
  window.__INITIAL_SCREEN = "about";
</script>

<link rel="stylesheet" href="styles.css">
<style id="__om-edit-overrides"></style>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='6' y='6' width='88' height='88' rx='22' fill='%23EFEAE0'/%3E%3Crect x='24' y='54' width='14' height='28' rx='2.5' fill='%233E7C5E'/%3E%3Crect x='43' y='42' width='14' height='40' rx='2.5' fill='%231E5C42'/%3E%3Crect x='62' y='26' width='14' height='56' rx='2.5' fill='%230F3D2E'/%3E%3Cpath d='M22 80 L74 42' stroke='%23C4703B' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M64 36 L80 34 L74 49 Z' fill='%23C4703B'/%3E%3C/svg%3E">
</head>
<body data-screen-label="Acerca">

<div class="app" id="app"></div>

<!-- Tweaks panel -->
<div class="tweaks" id="tweaks">
  <div class="tweaks-head">
    <strong>Tweaks</strong>
    <button class="icon-btn" style="width:26px;height:26px;border:none;background:transparent" onclick="closeTweaks()" aria-label="close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="tweaks-body">
    <div class="tw-group">
      <label>Theme</label>
      <div class="tw-themes" id="tw-themes"></div>
    </div>
    <div class="tw-group">
      <div class="tw-toggle-row">
        <label style="color:var(--ink); text-transform:none; letter-spacing:0; font-family:var(--font-sans); font-size:13px; font-weight:500;">Background grid</label>
        <div class="tw-toggle" id="tw-grid" onclick="toggleGrid()"></div>
      </div>
    </div>
    <div class="tw-group">
      <div class="tw-toggle-row">
        <label style="color:var(--ink); text-transform:none; letter-spacing:0; font-family:var(--font-sans); font-size:13px; font-weight:500;">Compact density</label>
        <div class="tw-toggle" id="tw-density" onclick="toggleDensity()"></div>
      </div>
    </div>
  </div>
</div>

<!-- Supabase: cliente (CDN) + config + capa de datos. Cargan ANTES de app.js. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/common/supabase-config.js"></script>
<script src="js/common/supabase-data.js"></script>
<!-- App dividida por dominio. Orden de carga importa: -->
<!-- data (compartido) → pantallas → core (estado + boot, va último). -->
<script src="js/common/data.js?v=19"></script>
<script src="js/acceso/screens-acceso.js?v=19"></script>
<script src="js/simulaciones/screens-simulacion.js?v=19"></script>
<script src="js/geolytics/screens-inicio.js?v=19"></script>
<script src="js/administracion/screens-cuenta.js?v=19"></script>
<script src="js/common/core.js?v=19"></script>
</body>
</html>
