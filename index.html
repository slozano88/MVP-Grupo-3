<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geolytics</title>
<script>
  // Punto de entrada.
  // Vuelta de Google/OAuth (#access_token o ?code) → carga Supabase de forma dinámica, espera a que guarde la sesión y recién entra a la app

  (function () {
    var HOME = 'Geolytics.html';
    var h = location.hash || '', q = location.search || '';
    var isOAuth = h.indexOf('access_token') !== -1 || h.indexOf('error') !== -1 || q.indexOf('code=') !== -1;

    function go() {
      try { location.replace(HOME); }
      catch (e) { try { location.href = HOME; } catch (_) {} }
    }

    if (!isOAuth) {
      go();
      document.addEventListener('DOMContentLoaded', go);
      window.addEventListener('load', go);
      setTimeout(go, 300);
      setTimeout(go, 1200);
      return;
    }

    var done = false;
    function goOnce() { if (done) return; done = true; go(); }

    var lib = document.createElement('script');
    lib.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
    lib.onload = function () {
      var cfg = document.createElement('script');
      cfg.src = 'js/common/supabase-config.js';
      cfg.onload = function () {
        try {
          var c = window.supabaseClient;
          if (c && c.auth) {
            c.auth.onAuthStateChange(function (_e, s) { if (s) goOnce(); });
            c.auth.getSession().then(function (r) { if (r && r.data && r.data.session) goOnce(); }).catch(function () {});
          }
        } catch (e) {}
      };
      cfg.onerror = goOnce;
      document.head.appendChild(cfg);
    };
    lib.onerror = goOnce;
    document.head.appendChild(lib);

    // Respaldo: si algo tarda o falla, entramos igual (la app reintenta leer la sesión)
    setTimeout(goOnce, 3000);
  })();
</script>
</head>
<body style="margin:0;background:#F4F1EA;font-family:system-ui,-apple-system,sans-serif;color:#3a3a3a;display:flex;align-items:center;justify-content:center;height:100vh;">
  <a href="Geolytics.html" style="font-size:15px;opacity:.7;color:inherit;text-decoration:none;">Iniciando…</a>
  <noscript><a href="Geolytics.html">Entrar a Geolytics</a></noscript>
</body>
</html>
